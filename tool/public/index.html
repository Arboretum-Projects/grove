<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grove</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <style>
    :root {
      --bg: #0e0e12;
      --bg-surface: #16161d;
      --bg-raised: #1e1e28;
      --bg-hover: #262633;
      --border: #2a2a3a;
      --border-subtle: #1f1f2e;
      --text: #d4d4e0;
      --text-dim: #8888a0;
      --text-faint: #55556a;
      --accent: #7c6fea;
      --accent-glow: #7c6fea33;
      --accent-dim: #5a4fc7;
      --green: #4ade80;
      --amber: #f0b040;
      --rose: #f07070;
      --cyan: #40d0e0;
      --sidebar-width: 300px;
      --header-height: 52px;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
    }

    /* ── Layout ─────────────────────────────── */
    #app {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      grid-template-rows: var(--header-height) 1fr;
      height: 100vh;
    }

    #app.no-sidebar {
      grid-template-columns: 1fr;
    }

    #app.no-sidebar #sidebar { display: none; }

    /* ── Header ─────────────────────────────── */
    #header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      gap: 16px;
      z-index: 10;
    }

    .logo {
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    .logo svg { width: 20px; height: 20px; }

    #breadcrumb {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--text-dim);
      min-width: 0;
      overflow: hidden;
    }

    #breadcrumb span {
      white-space: nowrap;
      cursor: pointer;
      transition: color 0.15s;
    }

    #breadcrumb span:hover { color: var(--text); }
    #breadcrumb span:last-child { color: var(--text); font-weight: 500; }

    #breadcrumb .sep {
      color: var(--text-faint);
      cursor: default;
      flex-shrink: 0;
    }

    #search-box {
      margin-left: auto;
      position: relative;
    }

    #search-box input {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px 6px 32px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      width: 220px;
      outline: none;
      transition: border-color 0.2s, width 0.2s;
    }

    #search-box input:focus {
      border-color: var(--accent);
      width: 300px;
    }

    #search-box svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      color: var(--text-faint);
      pointer-events: none;
    }

    /* ── Sidebar ────────────────────────────── */
    #sidebar {
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      display: flex;
      flex-direction: column;
    }

    #sidebar::-webkit-scrollbar { width: 6px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Sidebar project header ──────────────── */
    .sidebar-project-header {
      padding: 12px 12px 8px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .project-switcher {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }

    .project-switcher:hover { background: var(--bg-hover); }

    .project-switcher .project-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-switcher .switcher-chevron {
      width: 14px;
      height: 14px;
      color: var(--text-faint);
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .project-switcher.open .switcher-chevron { transform: rotate(180deg); }

    .switcher-dropdown {
      display: none;
      margin-top: 4px;
      border-radius: 6px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .switcher-dropdown.open { display: block; }

    .switcher-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    .switcher-option:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .switcher-option.active {
      color: var(--accent);
      font-weight: 500;
    }

    .switcher-option .opt-meta {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-faint);
    }

    #sidebar-tree {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .tree-group { margin-bottom: 2px; }

    .tree-dir {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px 6px calc(12px + var(--depth, 0) * 16px);
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      user-select: none;
      transition: background 0.12s, color 0.12s;
    }

    .tree-dir:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .tree-dir .chevron {
      width: 14px;
      height: 14px;
      transition: transform 0.15s;
      flex-shrink: 0;
      color: var(--text-faint);
    }

    .tree-dir.collapsed .chevron { transform: rotate(-90deg); }
    .tree-dir .dir-icon { width: 16px; height: 16px; flex-shrink: 0; }

    .tree-children { overflow: hidden; }
    .tree-dir.collapsed + .tree-children { display: none; }

    .tree-file {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px 5px calc(12px + var(--depth, 0) * 16px);
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      text-decoration: none;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-file:hover {
      background: var(--bg-hover);
      color: var(--text);
    }

    .tree-file.active {
      background: var(--accent-glow);
      color: var(--accent);
      font-weight: 500;
    }

    .tree-file .file-icon { width: 15px; height: 15px; flex-shrink: 0; }
    .tree-file .file-icon.md { color: var(--cyan); }
    .tree-file .file-icon.yaml { color: var(--amber); }
    .tree-file .file-icon.other { color: var(--text-faint); }

    /* ── Content ─────────────────────────────── */
    #content {
      overflow-y: auto;
      padding: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #content::-webkit-scrollbar { width: 8px; }
    #content::-webkit-scrollbar-track { background: transparent; }
    #content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Landing page ────────────────────────── */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 32px;
      max-width: 900px;
      margin: 0 auto;
    }

    .landing .landing-logo {
      color: var(--accent);
      opacity: 0.4;
      margin-bottom: 24px;
    }

    .landing .landing-logo svg { width: 56px; height: 56px; }

    .landing h1 {
      font-size: 28px;
      font-weight: 300;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .landing h1 strong { font-weight: 600; color: var(--accent); }

    .landing .landing-sub {
      font-size: 14px;
      color: var(--text-faint);
      margin-bottom: 40px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
    }

    .project-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    .project-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(124, 111, 234, 0.1);
    }

    .project-card .card-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .project-card .card-name svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .project-card .card-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-faint);
    }

    .project-card .card-stat {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .project-card .card-stat .n {
      color: var(--text-dim);
      font-weight: 600;
    }

    /* ── Project welcome (file not selected) ── */
    .project-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-faint);
      gap: 12px;
    }

    .project-welcome svg { width: 48px; height: 48px; opacity: 0.25; }
    .project-welcome .pw-name { color: var(--text-dim); font-weight: 500; font-size: 18px; }
    .project-welcome p { font-size: 14px; }

    .project-welcome .pw-stats {
      display: flex;
      gap: 24px;
      margin-top: 4px;
      font-size: 13px;
    }

    .project-welcome .pw-stat {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .project-welcome .pw-stat .num { color: var(--accent); font-weight: 600; font-size: 20px; }

    /* ── File header bar ─────────────────────── */
    .file-header {
      position: sticky;
      top: 0;
      border-bottom: 1px solid var(--border-subtle);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 5;
      backdrop-filter: blur(12px);
      background: rgba(14, 14, 18, 0.85);
    }

    .file-header .tag {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--bg-raised);
      border: 1px solid var(--border);
    }

    .file-header .tag.md { color: var(--cyan); border-color: #40d0e033; }
    .file-header .tag.yaml { color: var(--amber); border-color: #f0b04033; }
    .file-header .tag.other { color: var(--text-dim); }

    .file-header .file-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    /* ── YAML frontmatter ────────────────────── */
    .frontmatter {
      margin: 24px 32px 0;
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      line-height: 1.7;
      overflow-x: auto;
    }

    .frontmatter .fm-key { color: var(--cyan); }
    .frontmatter .fm-val { color: var(--text); }
    .frontmatter .fm-str { color: var(--green); }
    .frontmatter .fm-num { color: var(--amber); }
    .frontmatter .fm-bool { color: var(--rose); }
    .frontmatter .fm-null { color: var(--text-faint); font-style: italic; }
    .frontmatter .fm-comment { color: var(--text-faint); }

    /* ── Rendered markdown ────────────────────── */
    .rendered {
      padding: 24px 32px 64px;
      max-width: 860px;
    }

    .rendered h1 {
      font-size: 28px;
      font-weight: 600;
      color: #ececf4;
      margin: 0 0 20px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }

    .rendered h2 { font-size: 20px; font-weight: 600; color: #dcdce8; margin: 32px 0 12px; }
    .rendered h3 { font-size: 16px; font-weight: 600; color: #c0c0d4; margin: 24px 0 8px; }
    .rendered h4 { font-size: 14px; font-weight: 600; color: var(--text-dim); margin: 20px 0 6px; }
    .rendered p { margin: 0 0 12px; }
    .rendered strong { color: #ececf4; font-weight: 600; }
    .rendered em { font-style: italic; color: var(--text-dim); }

    .rendered a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .rendered a:hover { border-bottom-color: var(--accent); }

    .rendered ul, .rendered ol { margin: 0 0 12px; padding-left: 24px; }
    .rendered li { margin: 2px 0; }
    .rendered li::marker { color: var(--text-faint); }

    .rendered hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    .rendered blockquote {
      border-left: 3px solid var(--accent);
      margin: 12px 0;
      padding: 8px 16px;
      color: var(--text-dim);
      background: var(--bg-raised);
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .rendered code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88em;
      background: var(--bg-raised);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--cyan);
    }

    .rendered pre {
      background: var(--bg-raised);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      overflow-x: auto;
      margin: 12px 0 16px;
    }

    .rendered pre code {
      background: none;
      padding: 0;
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--text);
    }

    /* ── Tables ──────────────────────────────── */
    .rendered table { width: 100%; border-collapse: collapse; margin: 12px 0 20px; font-size: 13px; }

    .rendered thead th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
      color: var(--text-dim);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .rendered tbody td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-subtle);
      vertical-align: top;
    }

    .rendered tbody tr:hover { background: var(--bg-hover); }
    .rendered tbody td strong { color: var(--text); }

    /* ── YAML full-file rendering ────────────── */
    .yaml-content {
      padding: 24px 32px 64px;
      max-width: 900px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .y-key { color: var(--cyan); }
    .y-str { color: var(--green); }
    .y-num { color: var(--amber); }
    .y-bool { color: var(--rose); }
    .y-null { color: var(--text-faint); font-style: italic; }
    .y-comment { color: var(--text-faint); }
    .y-punct { color: var(--text-faint); }
    .y-anchor { color: var(--accent); }

    /* ── Checkbox styling ────────────────────── */
    .rendered input[type="checkbox"] {
      appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-radius: 4px;
      background: var(--bg-raised);
      vertical-align: middle;
      margin-right: 6px;
      position: relative;
      top: -1px;
    }

    .rendered input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* ── Animations ──────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in { animation: fadeIn 0.2s ease-out; }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-width: 0px; }
      #sidebar { display: none; }
      .rendered { padding: 20px 16px 64px; }
      .frontmatter { margin: 16px 16px 0; }
      .yaml-content { padding: 20px 16px 64px; }
      .landing { padding: 40px 16px; }
    }
  </style>
</head>
<body>
  <div id="app" class="no-sidebar">
    <header id="header">
      <div class="logo" id="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        Grove
      </div>
      <div id="breadcrumb"></div>
      <div id="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search files..." />
      </div>
    </header>
    <nav id="sidebar"></nav>
    <main id="content"></main>
  </div>

  <script>
    const md = window.markdownit({ html: true, linkify: true, typographer: true });

    md.renderer.rules.text = function(tokens, idx) {
      const text = tokens[idx].content;
      return text.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, link, label) => {
        return `<em>${md.utils.escapeHtml(label || link)}</em>`;
      }).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]||c))
        // undo double-escape: the replace above re-escapes, but markdownit already does it
        // actually let's just use the simple approach
    };
    // Simpler: override text to just handle wiki-links
    md.renderer.rules.text = function(tokens, idx) {
      const raw = tokens[idx].content;
      const escaped = md.utils.escapeHtml(raw);
      return escaped.replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g, (_, link, label) => {
        return `<em>${label || link}</em>`;
      });
    };

    // ── State ─────────────────────────────────
    let projects = [];
    let currentProject = null;
    let activeFilePath = null;
    let isStatic = false;

    const ICON = {
      layers: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>`,
      folder: `<svg class="dir-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>`,
      chevron: `<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>`,
      fileMd: `<svg class="file-icon md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M8 9h2"/></svg>`,
      fileYaml: `<svg class="file-icon yaml" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/><path d="M8 13l2 3 2-3"/><path d="M10 16v3"/></svg>`,
      fileOther: `<svg class="file-icon other" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>`,
    };

    // ── Boot ──────────────────────────────────
    async function init() {
      try {
        const res = await fetch('/api/tree');
        if (res.ok) {
          // Server mode — legacy single-project format
          const data = await res.json();
          if (data.projects) {
            projects = data.projects;
          } else {
            projects = [{ name: data.root, path: '', fileCount: flattenFiles(data.tree).length, dirCount: countDirs(data.tree), tree: data.tree }];
          }
          isStatic = false;
        }
      } catch {
        const res = await fetch('tree.json');
        const data = await res.json();
        projects = data.projects || [];
        isStatic = true;
      }

      document.getElementById('logo').onclick = () => goHome();
      setupSearch();

      if (projects.length === 1) {
        enterProject(projects[0]);
      } else {
        goHome();
      }
    }

    function flattenFiles(nodes) {
      const files = [];
      for (const n of nodes) {
        if (n.type === 'file') files.push(n);
        else if (n.children) files.push(...flattenFiles(n.children));
      }
      return files;
    }

    function countDirs(nodes) {
      let c = 0;
      for (const n of nodes) {
        if (n.type === 'directory') { c++; if (n.children) c += countDirs(n.children); }
      }
      return c;
    }

    // ── Landing (project list) ────────────────
    function goHome() {
      currentProject = null;
      activeFilePath = null;

      document.getElementById('app').classList.add('no-sidebar');
      document.getElementById('breadcrumb').innerHTML = '';
      document.getElementById('sidebar').innerHTML = '';
      document.title = 'Grove';

      const content = document.getElementById('content');
      let html = `<div class="landing fade-in">`;
      html += `<div class="landing-logo">${ICON.layers}</div>`;
      html += `<h1><strong>Grove</strong></h1>`;
      html += `<p class="landing-sub">${projects.length} project${projects.length !== 1 ? 's' : ''}</p>`;
      html += `<div class="project-grid">`;

      for (const p of projects) {
        html += `
          <div class="project-card" onclick="enterProject(projects.find(x=>x.name==='${escapeAttr(p.name)}'))">
            <div class="card-name">
              ${ICON.folder}
              ${escapeHtml(formatName(p.name))}
            </div>
            <div class="card-stats">
              <div class="card-stat"><span class="n">${p.fileCount}</span> files</div>
              <div class="card-stat"><span class="n">${p.dirCount}</span> folders</div>
            </div>
          </div>`;
      }

      html += `</div></div>`;
      content.innerHTML = html;
      content.scrollTop = 0;
    }

    // ── Enter a project ───────────────────────
    function enterProject(project) {
      currentProject = project;
      activeFilePath = null;

      document.getElementById('app').classList.remove('no-sidebar');
      document.title = `Grove - ${formatName(project.name)}`;

      // Build sidebar
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = '';

      // Project header with switcher
      if (projects.length > 1) {
        const header = document.createElement('div');
        header.className = 'sidebar-project-header';

        const switcher = document.createElement('div');
        switcher.className = 'project-switcher';
        switcher.innerHTML = `
          ${ICON.folder}
          <span class="project-label">${escapeHtml(formatName(project.name))}</span>
          <svg class="switcher-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        `;

        const dropdown = document.createElement('div');
        dropdown.className = 'switcher-dropdown';

        for (const p of projects) {
          const opt = document.createElement('div');
          opt.className = 'switcher-option' + (p.name === project.name ? ' active' : '');
          opt.innerHTML = `${escapeHtml(formatName(p.name))}<span class="opt-meta">${p.fileCount} files</span>`;
          opt.onclick = (e) => { e.stopPropagation(); enterProject(p); };
          dropdown.appendChild(opt);
        }

        switcher.onclick = () => {
          switcher.classList.toggle('open');
          dropdown.classList.toggle('open');
        };

        header.appendChild(switcher);
        header.appendChild(dropdown);
        sidebar.appendChild(header);
      }

      // File tree
      const treeContainer = document.createElement('div');
      treeContainer.id = 'sidebar-tree';
      renderTree(project.tree, treeContainer, 0);
      sidebar.appendChild(treeContainer);

      // Breadcrumb
      updateBreadcrumb();

      // Content: project welcome
      showProjectWelcome();
    }

    function showProjectWelcome() {
      const p = currentProject;
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="project-welcome fade-in">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <div class="pw-name">${escapeHtml(formatName(p.name))}</div>
          <p>Select a file from the sidebar</p>
          <div class="pw-stats">
            <div class="pw-stat"><span class="num">${p.fileCount}</span> files</div>
            <div class="pw-stat"><span class="num">${p.dirCount}</span> folders</div>
          </div>
        </div>
      `;
      content.scrollTop = 0;

      activeFilePath = null;
      document.querySelectorAll('.tree-file').forEach(el => el.classList.remove('active'));
      updateBreadcrumb();
    }

    // ── Tree rendering ────────────────────────
    function renderTree(nodes, container, depth) {
      for (const node of nodes) {
        if (node.type === 'directory') {
          const group = document.createElement('div');
          group.className = 'tree-group';

          const dir = document.createElement('div');
          dir.className = 'tree-dir';
          dir.style.setProperty('--depth', depth);
          dir.innerHTML = `${ICON.chevron}${ICON.folder}<span>${escapeHtml(node.name)}</span>`;
          dir.onclick = () => dir.classList.toggle('collapsed');

          const children = document.createElement('div');
          children.className = 'tree-children';
          renderTree(node.children, children, depth + 1);

          group.appendChild(dir);
          group.appendChild(children);
          container.appendChild(group);
        } else {
          const file = document.createElement('div');
          file.className = 'tree-file';
          file.dataset.path = node.path;
          file.style.setProperty('--depth', depth);

          const ext = node.name.split('.').pop().toLowerCase();
          const icon = ext === 'md' ? ICON.fileMd : (ext === 'yaml' || ext === 'yml') ? ICON.fileYaml : ICON.fileOther;

          file.innerHTML = `${icon}<span>${escapeHtml(node.name)}</span>`;
          file.onclick = () => loadFile(node.path);
          container.appendChild(file);
        }
      }
    }

    // ── File loading ──────────────────────────
    async function loadFile(filePath) {
      activeFilePath = filePath;

      document.querySelectorAll('.tree-file').forEach(el => {
        el.classList.toggle('active', el.dataset.path === filePath);
      });

      // Expand parents
      const activeEl = document.querySelector(`.tree-file[data-path="${CSS.escape(filePath)}"]`);
      if (activeEl) {
        let parent = activeEl.parentElement;
        while (parent && parent.id !== 'sidebar-tree') {
          if (parent.classList.contains('tree-children')) {
            const dir = parent.previousElementSibling;
            if (dir && dir.classList.contains('tree-dir')) dir.classList.remove('collapsed');
          }
          parent = parent.parentElement;
        }
        activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }

      updateBreadcrumb(filePath);

      let data;
      if (isStatic) {
        const fetchPath = currentProject.path ? `${currentProject.path}/${filePath}` : filePath;
        const res = await fetch(encodeURI(fetchPath));
        const content = await res.text();
        const ext = '.' + filePath.split('.').pop().toLowerCase();
        data = { path: filePath, ext, content };
      } else {
        const fetchPath = currentProject.path ? `${currentProject.path}/${filePath}` : filePath;
        const res = await fetch(`/api/file?path=${encodeURIComponent(fetchPath)}`);
        data = await res.json();
      }
      renderFile(data);
    }

    // ── Breadcrumb ────────────────────────────
    function updateBreadcrumb(filePath) {
      const bc = document.getElementById('breadcrumb');
      bc.innerHTML = '';

      if (projects.length > 1) {
        const home = document.createElement('span');
        home.textContent = 'Grove';
        home.onclick = () => goHome();
        bc.appendChild(home);
        bc.appendChild(makeSep());
      }

      if (currentProject) {
        const proj = document.createElement('span');
        proj.textContent = formatName(currentProject.name);
        proj.onclick = () => showProjectWelcome();
        bc.appendChild(proj);

        if (filePath) {
          const parts = filePath.split('/');
          for (let i = 0; i < parts.length; i++) {
            bc.appendChild(makeSep());
            const span = document.createElement('span');
            span.textContent = parts[i];
            if (i < parts.length - 1) span.style.cursor = 'default';
            bc.appendChild(span);
          }
        }
      }
    }

    function makeSep() {
      const s = document.createElement('span');
      s.className = 'sep';
      s.textContent = '/';
      return s;
    }

    // ── Rendering ─────────────────────────────
    function renderFile(data) {
      const content = document.getElementById('content');
      const ext = data.ext.toLowerCase();
      const fileName = data.path.split('/').pop();

      if (ext === '.md') renderMarkdown(content, data.content, fileName);
      else if (ext === '.yaml' || ext === '.yml') renderYaml(content, data.content, fileName);
      else renderPlainText(content, data.content, fileName);

      content.scrollTop = 0;
    }

    function renderMarkdown(container, raw, fileName) {
      let frontmatter = null, body = raw;
      const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (fmMatch) { frontmatter = fmMatch[1]; body = fmMatch[2]; }

      let html = `<div class="fade-in">`;
      html += `<div class="file-header"><span class="tag md">MD</span><span class="file-name">${escapeHtml(fileName)}</span></div>`;
      if (frontmatter) html += `<div class="frontmatter">${highlightYaml(frontmatter)}</div>`;
      html += `<div class="rendered">${md.render(body)}</div></div>`;
      container.innerHTML = html;

      container.querySelectorAll('li').forEach(li => {
        const t = li.innerHTML;
        if (t.startsWith('[ ] ')) li.innerHTML = `<input type="checkbox" disabled />${t.slice(4)}`;
        else if (t.startsWith('[x] ') || t.startsWith('[X] ')) li.innerHTML = `<input type="checkbox" checked disabled />${t.slice(4)}`;
      });
    }

    function renderYaml(container, raw, fileName) {
      container.innerHTML = `<div class="fade-in"><div class="file-header"><span class="tag yaml">YAML</span><span class="file-name">${escapeHtml(fileName)}</span></div><div class="yaml-content">${highlightYaml(raw)}</div></div>`;
    }

    function renderPlainText(container, raw, fileName) {
      container.innerHTML = `<div class="fade-in"><div class="file-header"><span class="tag other">TXT</span><span class="file-name">${escapeHtml(fileName)}</span></div><div class="yaml-content">${escapeHtml(raw)}</div></div>`;
    }

    // ── YAML syntax highlighting ──────────────
    function highlightYaml(text) {
      return text.split('\n').map(line => {
        if (line.match(/^\s*#/)) return `<span class="y-comment">${escapeHtml(line)}</span>`;
        const kv = line.match(/^(\s*)([\w][\w\-./]*)\s*(:)(.*)/);
        if (kv) return escapeHtml(kv[1]) + `<span class="y-key">${escapeHtml(kv[2])}</span><span class="y-punct">${kv[3]}</span>` + hlVal(kv[4]);
        const li = line.match(/^(\s*)(- )(.*)/);
        if (li) {
          const ik = li[3].match(/^([\w][\w\-./]*)\s*(:)(.*)/);
          if (ik) return escapeHtml(li[1]) + `<span class="y-punct">${li[2]}</span><span class="y-key">${escapeHtml(ik[1])}</span><span class="y-punct">${ik[2]}</span>` + hlVal(ik[3]);
          return escapeHtml(li[1]) + `<span class="y-punct">${li[2]}</span>` + hlVal(li[3]);
        }
        return escapeHtml(line);
      }).join('\n');
    }

    function hlVal(val) {
      if (!val || !val.trim()) return escapeHtml(val);
      const t = val.trim(), lead = val.slice(0, val.length - val.trimStart().length);
      if (/^".*"$/.test(t) || /^'.*'$/.test(t)) return escapeHtml(lead) + `<span class="y-str">${escapeHtml(t)}</span>`;
      if (/^-?\d+(\.\d+)?$/.test(t)) return escapeHtml(lead) + `<span class="y-num">${escapeHtml(t)}</span>`;
      if (/^(true|false|yes|no)$/i.test(t)) return escapeHtml(lead) + `<span class="y-bool">${escapeHtml(t)}</span>`;
      if (/^(null|~)$/i.test(t)) return escapeHtml(lead) + `<span class="y-null">${escapeHtml(t)}</span>`;
      if (/^[&*]/.test(t)) return escapeHtml(lead) + `<span class="y-anchor">${escapeHtml(t)}</span>`;
      const ci = t.indexOf(' #');
      if (ci > 0) return escapeHtml(lead) + hlVal(' ' + t.slice(0, ci)).trim() + `<span class="y-comment">${escapeHtml(t.slice(ci))}</span>`;
      if (t.length > 0) return escapeHtml(lead) + `<span class="y-str">${escapeHtml(t)}</span>`;
      return escapeHtml(val);
    }

    // ── Search ────────────────────────────────
    function setupSearch() {
      const input = document.getElementById('search-input');
      input.addEventListener('input', () => filterTree(input.value.trim().toLowerCase()));
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); input.focus(); input.select(); }
        if (e.key === 'Escape' && document.activeElement === input) { input.value = ''; filterTree(''); input.blur(); }
      });
    }

    function filterTree(query) {
      const container = document.getElementById('sidebar-tree');
      if (!container) return;
      if (!query) { container.querySelectorAll('.tree-file, .tree-group').forEach(el => el.style.display = ''); return; }
      container.querySelectorAll('.tree-file').forEach(el => {
        const name = el.querySelector('span').textContent.toLowerCase();
        const path = el.dataset.path.toLowerCase();
        const matches = name.includes(query) || path.includes(query);
        el.style.display = matches ? '' : 'none';
        if (matches) {
          let parent = el.parentElement;
          while (parent && parent !== container) {
            if (parent.classList.contains('tree-children')) {
              parent.style.display = '';
              const dir = parent.previousElementSibling;
              if (dir?.classList.contains('tree-dir')) { dir.classList.remove('collapsed'); dir.style.display = ''; }
            }
            if (parent.classList.contains('tree-group')) parent.style.display = '';
            parent = parent.parentElement;
          }
        }
      });
      container.querySelectorAll('.tree-group').forEach(g => {
        if (!g.querySelectorAll('.tree-file:not([style*="display: none"])').length) g.style.display = 'none';
      });
    }

    // ── Utility ───────────────────────────────
    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function escapeAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
    function formatName(s) { return s.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()); }

    // ── Start ─────────────────────────────────
    init();
  </script>
</body>
</html>
